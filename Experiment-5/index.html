 <h1>All Blog Posts</h1>
    
    {% if posts %}
        <div class="posts-container">
            {% for post in posts %}
                <article class="post-card">
                    <h2>{{ post.title }}</h2>
                    <p>{{ post.content }}</p>
                    
                    <div class="post-actions">
                        <a href="{{ url_for('edit', post_id=post.id) }}" class="btn btn-edit">Edit</a>
                        
                        <form action="{{ url_for('delete', post_id=post.id) }}" method="POST" style="display:inline;">
                            <button type="submit" class="btn btn-delete" onclick="return confirm('Are you sure you want to delete this post?');">Delete</button>
                        </form>
                    </div>
                </article>
            {% endfor %}
        </div>
    {% else %}
        <p>No posts available yet. <a href="{{ url_for('create') }}">Create one!</a></p>
    {% endif %}
{% endblock %}

Create.html:
   <h1>Create a New Blog Post</h1>
    
    <form method="POST" class="post-form">
        <div class="form-group">
            <label for="title">Post Title</label>
            <input type="text" id="title" name="title" required>
        </div>
        <div class="form-group">
            <label for="content">Post Content</label>
            <textarea id="content" name="content" rows="6" required></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Publish Post</button>
    </form>
{% endblock %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechStore - E-commerce</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="nav-brand" onclick="showSection('home')">TechStore</div>
        <div class="cart-btn" onclick="showSection('cart')">
            🛒 Cart (<span id="cart-count">0</span>)
        </div>
    </nav>

    <main id="home-section">
        <header class="hero">
            <h1>Welcome to TechStore</h1>
            <p>Your one-stop shop for the best gadgets.</p>
        </header>
        
        <div class="product-grid" id="product-list">
            </div>
    </main>

    <main id="cart-section" class="hidden">
        <h2>Your Shopping Cart</h2>
        <div id="cart-items">
            </div>
        <div class="cart-summary">
            <h3>Total: ₹<span id="cart-total">0.00</span></h3>
            <button class="btn btn-primary" onclick="showSection('checkout')">Proceed to Checkout</button>
            <button class="btn btn-secondary" onclick="showSection('home')">Continue Shopping</button>
        </div>
    </main>

    <main id="checkout-section" class="hidden">
        <h2>Checkout</h2>
        <form id="checkout-form" onsubmit="processCheckout(event)">
            <div class="form-group">
                <label>Full Name:</label>
                <input type="text" required>
            </div>
            <div class="form-group">
                <label>Shipping Address:</label>
                <textarea required></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Confirm Purchase</button>
            <button type="button" class="btn btn-secondary" onclick="showSection('cart')">Back to Cart</button>
        </form>
        
        <div id="confirmation-msg" class="hidden">
            <h2 style="color: green;">🎉 Purchase Successful!</h2>
            <p>Thank you for shopping with TechStore.</p>
            <button class="btn btn-primary" onclick="window.location.reload()">Return to Store</button>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
